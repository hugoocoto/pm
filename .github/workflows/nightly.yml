name: Nightly Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y liblua5.4-dev libcurl4-openssl-dev libssl-dev

      - name: Build
        run: make release STATIC_LUA=1

      - name: Build source tarball
        run: git archive --format=tar.gz --output=pm.tar.gz HEAD

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(./pm --version 2>&1 | head -1 | sed 's/.*version //; s/ (.*//')
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          mv pm "pm-${OS}-${ARCH}"
          git tag -f nightly HEAD
          git push origin nightly --force
          gh release delete nightly --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create nightly "pm-${OS}-${ARCH}" pm.tar.gz \
            --title "Nightly build $VERSION" \
            --notes "Built from ${{ github.sha }}" \
            --repo ${{ github.repository }}
