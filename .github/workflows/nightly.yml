name: Nightly Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y liblua5.4-dev libcurl4-openssl-dev libssl-dev lua-sec lua-socket

      - name: Build
        run: make release

      - name: Build AppImage
        run: |
          make appimage
          ARCH=$(uname -m)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage
          chmod +x linuxdeploy-${ARCH}.AppImage
          ./linuxdeploy-${ARCH}.AppImage --appimage-extract
          mv squashfs-root linuxdeploy
          ARCH=${ARCH} ./linuxdeploy/AppRun --appdir AppDir
          # bundle lua-sec and lua-socket (dynamically loaded by Lua, invisible to ldd)
          cp -a /usr/share/lua/5.4 AppDir/usr/lib/x86_64-linux-gnu/
          cp -a /usr/lib/x86_64-linux-gnu/lua/5.4 AppDir/usr/lib/x86_64-linux-gnu/lua/
          cp -a /usr/lib/x86_64-linux-gnu/liblua5.4-{sec,socket,mime}* AppDir/usr/lib/
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${ARCH}.AppImage
          chmod +x appimagetool-${ARCH}.AppImage
          ./appimagetool-${ARCH}.AppImage --appimage-extract
          mv squashfs-root appimagetool
          ARCH=${ARCH} ./appimagetool/AppRun AppDir pm-${ARCH}.AppImage

      - name: Build source tarball
        run: git archive --format=tar.gz --output=pm.tar.gz HEAD

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCH=$(uname -m)
          VERSION=$(./pm --version 2>&1 | head -1 | sed 's/.*version //; s/ (.*//')
          git tag -f nightly HEAD
          git push origin nightly --force
          git tag -f v0.3-nightly HEAD
          git push origin v0.3-nightly --force
          gh release delete nightly --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create nightly "pm-${ARCH}.AppImage" pm.tar.gz \
            --title "Nightly build $VERSION" \
            --notes "Built from ${{ github.sha }}" \
            --repo ${{ github.repository }}
